name: Snyk

on:
  push:
    branches:
      - develop
      - master
  pull_request:
    branches:
      - develop
      - master
  schedule:
    - cron: "0 16 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  open-source:
    name: Open Source and Container
    if: >-
      github.actor != 'dependabot[bot]' &&
      (github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

    steps:
      - name: Check Snyk configuration
        if: env.SNYK_TOKEN == ''
        run: echo "::warning::SNYK_TOKEN is not configured; skipping Snyk scan."

      - name: Checkout
        if: env.SNYK_TOKEN != ''
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Use Node.js 24.x
        if: env.SNYK_TOKEN != ''
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.x
          cache: npm

      - name: Install dependencies
        if: env.SNYK_TOKEN != ''
        run: npm ci

      - name: Scan dependencies
        if: env.SNYK_TOKEN != ''
        uses: snyk/actions/node@9adf32b1121593767fc3c057af55b55db032dc04 # v1.0.0
        with:
          args: >-
            --file=package.json
            --package-manager=npm
            --severity-threshold=high

      - name: Build production image
        if: env.SNYK_TOKEN != ''
        run: docker build --target production --tag docker-node-app:snyk .

      - name: Scan production image
        if: env.SNYK_TOKEN != ''
        uses: snyk/actions/docker@9adf32b1121593767fc3c057af55b55db032dc04 # v1.0.0
        with:
          image: docker-node-app:snyk
          args: >-
            --exclude-app-vulns
            --file=Dockerfile
            --severity-threshold=high
